<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BLACK JACK 292</title>
<link rel="stylesheet" href="/css/main.css" />
<link rel="stylesheet" href="/css/cards.css" />
</head>
<body>

<header class="topbar">
  <div class="logo">
    <span class="dealer-name dealer-name-main">"MICHAEL".</span>
    <span class="dealer-name dealer-name-sub">The - "WHITE" - RABBIT.</span>
  </div>
  <div id="balance-display" class="balance">—</div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="play">Play</button>
  <button class="tab-btn" data-tab="profile">Profile</button>
  <button class="tab-btn" data-tab="leaderboard">Leaderboard</button>
</nav>

<main id="app">

  <!-- ============================= PLAY TAB ============================= -->
  <section id="tab-play" class="tab-panel active">
    <div id="play-login-gate" class="panel">
      <p>Please log in or create an account from the Profile tab to play.</p>
    </div>

    <div id="play-game" class="panel hidden">
      <div id="dealer-area" class="dealer-area">
        <h3>Dealer</h3>
        <div id="dealer-cards" class="hand-container"></div>
      </div>

      <div id="hands-area" class="hands-area"></div>

      <div id="chip-tray" class="chip-tray"></div>

      <div id="action-bar" class="action-bar">
        <button id="btn-deal-first" class="action-btn">Deal</button>
        <button id="btn-finalize-reveals" class="action-btn hidden">Confirm reveals</button>
        <button id="btn-hit" class="action-btn hidden">Hit</button>
        <button id="btn-stand" class="action-btn hidden">Stand</button>
        <button id="btn-double" class="action-btn hidden">Double Down</button>
        <button id="btn-split" class="action-btn hidden">Split</button>
        <button id="btn-insurance" class="action-btn hidden">Insurance</button>
        <button id="btn-surrender" class="action-btn hidden">Surrender</button>
        <button id="btn-resolve" class="action-btn hidden">Resolve game</button>
        <button id="btn-new-game" class="action-btn hidden">New game</button>
      </div>

      <div id="reveal-quota" class="reveal-quota">Reveals used: 0 / 4</div>
      <div id="result-banner" class="result-banner hidden"></div>
    </div>
  </section>

  <!-- ============================= PROFILE TAB ============================= -->
  <section id="tab-profile" class="tab-panel">
    <div id="profile-logged-out" class="panel">
      <div class="form-toggle">
        <button id="show-login" class="link-btn active">Log in</button>
        <button id="show-signup" class="link-btn">Create account</button>
      </div>

      <form id="login-form" class="account-form">
        <input type="text" name="display_pseudo" placeholder="Pseudo" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit" class="action-btn">Log in</button>
        <div class="form-errors"></div>
      </form>

      <form id="signup-form" class="account-form hidden">
        <input type="text" name="last_name" placeholder="Last name" required />
        <input type="text" name="first_name" placeholder="First name" required />
        <input type="email" name="gmail" placeholder="Gmail address" required />
        <input type="text" name="display_pseudo" placeholder="Displayed pseudo" required />
        <input type="text" name="country" placeholder="Country" required />
        <input type="text" name="display_country" placeholder="Displayed country (e.g. flag)" required />
        <input type="text" name="emoji" placeholder="Secondary emoji (optional)" />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit" class="action-btn">Create account</button>
        <div class="form-errors"></div>
      </form>
    </div>

    <div id="profile-logged-in" class="panel hidden">
      <h2 id="profile-display-name"></h2>
      <p>Balance: <span id="profile-balance"></span></p>
      <button id="btn-edit-profile" class="action-btn">Edit profile</button>
      <button id="btn-logout" class="action-btn secondary">Log out</button>

      <div id="edit-step-1" class="panel hidden">
        <h3>Step 1 — Re-enter your current information</h3>
        <form id="verify-form" class="account-form">
          <input type="text" name="last_name" placeholder="Last name" required />
          <input type="text" name="first_name" placeholder="First name" required />
          <input type="email" name="gmail" placeholder="Gmail address" required />
          <input type="text" name="display_pseudo" placeholder="Displayed pseudo" required />
          <input type="text" name="country" placeholder="Country" required />
          <input type="text" name="display_country" placeholder="Displayed country" required />
          <input type="text" name="emoji" placeholder="Secondary emoji" />
          <input type="password" name="password" placeholder="Password" required />
          <button type="submit" class="action-btn">Verify</button>
          <div class="form-errors"></div>
        </form>
      </div>

      <div id="edit-step-2" class="panel hidden">
        <h3>Step 2 — Enter your new information</h3>
        <form id="update-form" class="account-form">
          <input type="text" name="last_name" placeholder="New last name" />
          <input type="text" name="first_name" placeholder="New first name" />
          <input type="email" name="gmail" placeholder="New Gmail address" />
          <input type="text" name="display_pseudo" placeholder="New displayed pseudo" />
          <input type="text" name="country" placeholder="New country" />
          <input type="text" name="display_country" placeholder="New displayed country" />
          <input type="text" name="emoji" placeholder="New secondary emoji" />
          <input type="password" name="password" placeholder="New password" />
          <button type="submit" class="action-btn">Save changes</button>
          <div class="form-errors"></div>
        </form>
      </div>
    </div>
  </section>

  <!-- ============================= LEADERBOARD TAB ============================= -->
  <section id="tab-leaderboard" class="tab-panel">
    <div class="panel">
      <h2>Ranked</h2>
      <div id="leaderboard-ranked"></div>

      <h2>Unranked</h2>
      <div id="leaderboard-unranked"></div>
    </div>

    <div id="history-modal" class="modal hidden">
      <div class="modal-content">
        <button id="close-history" class="link-btn">Close</button>
        <h2>Game history</h2>
        <div id="history-stats"></div>
        <div id="history-list"></div>
      </div>
    </div>

    <div id="game-detail-modal" class="modal hidden">
      <div class="modal-content">
        <button id="close-game-detail" class="link-btn">Close</button>
        <h2>Game detail</h2>
        <div id="game-detail-content"></div>
      </div>
    </div>
  </section>

</main>

<script src="/js/cardAssets.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
